<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Loan Offset Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#171210;}
a{color:#f5a860;text-decoration:none;}
a:hover{color:#ffc287;}
input::placeholder{color:#6f6151;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
.btn-remove-expense:hover{background:#3a2e22;color:#f87171;}
.btn-add-expense:hover{border-color:#f5a860;background:#2a2119;}
.btn-add-lump:hover{color:#ffc287;}
.btn-remove-lump:hover{color:#f87171;}
.main-grid{display:grid;grid-template-columns:330px 1fr;gap:20px;align-items:start;}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
@media (max-width:1020px){
  .main-grid{grid-template-columns:1fr;}
  .cards-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app" style="min-height:100vh;background:#171210;font-family:'Manrope',system-ui,sans-serif;color:#f0e8de;padding:44px 28px 64px">
  <div style="max-width:1240px;margin:0 auto">

    <div style="margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap">
      <div>
        <h1 data-bind="t.title" style="margin:0 0 6px;font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;letter-spacing:-0.01em;color:#ffffff"></h1>
        <p data-bind="t.subtitle" style="margin:0;font-size:14px;color:#ab9885"></p>
      </div>
      <div style="flex:none;display:flex;background:#2a2119;border:1px solid #46372a;border-radius:10px;padding:3px;gap:2px">
        <button id="btnEn" data-action="setEn" style="border:none;border-radius:8px;padding:7px 16px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;cursor:pointer">EN</button>
        <button id="btnZh" data-action="setZh" style="border:none;border-radius:8px;padding:7px 16px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;cursor:pointer">中文</button>
      </div>
    </div>

    <div class="main-grid">

      <!-- LEFT: Loan details -->
      <div style="background:#1f1813;border:1px solid #362a1f;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:20px">
        <div data-bind="t.loanDetails" style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:#ffffff"></div>

        <div>
          <label data-bind="t.propertyPrice" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
          <div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px">
            <span style="padding:0 0 0 14px;color:#a08d78;font-weight:600">$</span>
            <input type="number" data-model="propertyPrice" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;padding:12px 14px 12px 8px">
          </div>
          <input type="range" id="priceRange" min="100000" max="3000000" step="10000" data-model="propertyPrice" style="width:100%;margin-top:14px;accent-color:#f5a860;cursor:pointer">
        </div>

        <div>
          <label data-bind="t.depositLbl" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px;width:96px">
              <input type="number" step="1" min="0" max="100" data-model="depositPct" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;padding:12px 4px 12px 14px">
              <span style="padding:0 12px 0 0;color:#a08d78;font-size:13px;font-weight:600">%</span>
            </div>
            <div data-bind="depositText" style="font-size:13px;color:#a08d78;font-weight:600;font-family:'Space Grotesk',sans-serif"></div>
          </div>
        </div>

        <div>
          <label data-bind="t.loanType" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
          <select data-model="loanType" style="width:100%;background:#2a2119;border:1px solid #46372a;border-radius:10px;color:#ffffff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;padding:12px 14px;outline:none">
            <option value="Owner Occupier" data-bind="t.ownerOcc"></option>
            <option value="Investor" data-bind="t.investor"></option>
          </select>
        </div>

        <div>
          <label data-bind="t.yearsRemaining" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
          <select data-model="years" style="width:100%;background:#2a2119;border:1px solid #46372a;border-radius:10px;color:#ffffff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;padding:12px 14px;outline:none">
            <option value="10" data-bind="yearsOpt10"></option>
            <option value="15" data-bind="yearsOpt15"></option>
            <option value="20" data-bind="yearsOpt20"></option>
            <option value="25" data-bind="yearsOpt25"></option>
            <option value="30" data-bind="yearsOpt30"></option>
            <option value="35" data-bind="yearsOpt35"></option>
            <option value="40" data-bind="yearsOpt40"></option>
          </select>
        </div>

        <div>
          <label data-bind="t.interestRate" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px;width:120px">
              <input type="number" step="0.01" data-model="rate" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;padding:12px 4px 12px 14px">
              <span style="padding:0 12px 0 0;color:#a08d78;font-size:13px;font-weight:600">% p.a.</span>
            </div>
          </div>
          <input type="range" id="rateRange" min="1" max="10" step="0.05" data-model="rate" style="width:100%;margin-top:14px;accent-color:#f5a860;cursor:pointer">
        </div>

        <div style="background:#2a2119;border-radius:12px;padding:14px 16px">
          <div data-bind="t.loanBalance" style="font-size:12px;color:#a08d78;font-weight:600;margin-bottom:2px"></div>
          <div data-bind="loanBalanceText" style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#ffffff"></div>
          <div style="height:1px;background:#46372a;margin:12px 0"></div>
          <div data-bind="t.monthlyRepayment" style="font-size:12px;color:#a08d78;font-weight:600;margin-bottom:2px"></div>
          <div data-bind="payText" style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#ffffff"></div>
        </div>
      </div>

      <!-- RIGHT column -->
      <div style="display:flex;flex-direction:column;gap:20px">

        <div class="cards-grid">

          <!-- Income & expenses -->
          <div style="background:#1f1813;border:1px solid #362a1f;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:18px">
            <div data-bind="t.yourMoney" style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:#ffffff"></div>

            <div>
              <label data-bind="t.monthlyIncome" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
              <div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px">
                <span style="padding:0 0 0 14px;color:#a08d78;font-weight:600">$</span>
                <input type="number" data-model="income" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;padding:12px 14px 12px 8px">
              </div>
            </div>

            <div>
              <label data-bind="t.monthlyExpenses" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
              <div style="display:flex;flex-direction:column;gap:8px">
                <div id="expensesList" style="display:flex;flex-direction:column;gap:8px"></div>
                <button id="addExpenseBtn" data-action="addExpense" data-bind="t.addExpense" class="btn-add-expense" style="border:1px dashed #46372a;background:transparent;color:#f5a860;border-radius:10px;padding:9px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;cursor:pointer"></button>
              </div>
            </div>

            <div style="background:#2a2119;border-radius:12px;padding:16px">
              <div style="display:flex;justify-content:space-between;font-size:13px;color:#cbb8a4;margin-bottom:6px"><span data-bind="t.incomeLbl"></span><span data-bind="incomeText" style="font-family:'Space Grotesk',sans-serif;font-weight:600"></span></div>
              <div style="display:flex;justify-content:space-between;font-size:13px;color:#cbb8a4;margin-bottom:6px"><span data-bind="t.minusExpenses"></span><span data-bind="expensesText" style="font-family:'Space Grotesk',sans-serif;font-weight:600"></span></div>
              <div style="display:flex;justify-content:space-between;font-size:13px;color:#cbb8a4"><span data-bind="t.minusRepayment"></span><span data-bind="payText" style="font-family:'Space Grotesk',sans-serif;font-weight:600"></span></div>
              <div style="height:1px;background:#46372a;margin:12px 0"></div>
              <div data-bind="t.intoOffset" style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:2px"></div>
              <div data-bind="surplusText" style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:#f5a860"></div>
              <div id="deficitWarn"></div>
            </div>
          </div>

          <!-- Offset account -->
          <div style="background:#1f1813;border:1px solid #362a1f;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:18px">
            <div data-bind="t.offsetAccount" style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:#ffffff"></div>

            <div>
              <label data-bind="t.existingCash" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
              <div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px">
                <span style="padding:0 0 0 14px;color:#a08d78;font-weight:600">$</span>
                <input type="number" data-model="cash" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;padding:12px 14px 12px 8px">
              </div>
            </div>

            <div style="background:#2a2119;border-radius:12px;padding:14px 16px">
              <div data-bind="t.initialOffsetL" style="font-size:12px;color:#a08d78;font-weight:600;margin-bottom:2px"></div>
              <div data-bind="initialOffsetText" style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#ffffff"></div>
              <div data-bind="t.offsetHint" style="font-size:11px;color:#6f6151;margin-top:4px"></div>
              <div id="cashWarn"></div>
            </div>

            <div>
              <label data-bind="t.startUsing" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-bottom:8px"></label>
              <select data-model="startMonths" style="width:100%;background:#2a2119;border:1px solid #46372a;border-radius:10px;color:#ffffff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;padding:12px 14px;outline:none">
                <option value="0" data-bind="t.now"></option>
                <option value="6" data-bind="t.in6m"></option>
                <option value="12" data-bind="t.in1y"></option>
                <option value="24" data-bind="t.in2y"></option>
                <option value="60" data-bind="t.in5y"></option>
              </select>
            </div>

            <div id="lumpSection"></div>

            <div style="background:#2a2119;border-radius:12px;padding:14px 16px;margin-top:auto">
              <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:#a08d78;font-weight:600;margin-bottom:4px"><span data-bind="t.offsetAfterPre"></span><input type="number" min="1" max="40" data-model="horizonYears" style="width:48px;background:#2a2119;border:1px solid #46372a;border-radius:6px;color:#ffffff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:4px 2px;outline:none;text-align:center"><span data-bind="t.offsetAfterPost"></span></div>
              <div data-bind="offsetAt5Text" style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#ffffff"></div>
            </div>
          </div>
        </div>

        <!-- Results -->
        <div style="background:#1f1813;border:1px solid #362a1f;border-radius:16px;padding:28px">
          <div style="display:flex;gap:44px;flex-wrap:wrap;margin-bottom:26px">
            <div style="border-left:3px solid #f5a860;padding-left:18px">
              <div data-bind="t.interestSave" style="font-size:13px;color:#ab9885;font-weight:600;margin-bottom:4px"></div>
              <div data-bind="savedText" style="font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:700;color:#ffffff;line-height:1.05"></div>
              <div data-bind="interestCompareText" style="font-size:12px;color:#a08d78;margin-top:6px"></div>
            </div>
            <div style="border-left:3px solid #46372a;padding-left:18px">
              <div data-bind="t.termReduce" style="font-size:13px;color:#ab9885;font-weight:600;margin-bottom:4px"></div>
              <div data-bind="termReduceText" style="font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:#ffffff;line-height:1.2"></div>
              <div data-bind="payoffCompareText" style="font-size:12px;color:#a08d78;margin-top:6px"></div>
            </div>
          </div>

          <div style="display:flex;gap:18px;font-size:12px;font-weight:600;color:#cbb8a4;margin-bottom:14px">
            <span id="legendBaseline" style="display:flex;align-items:center;gap:7px"><span style="width:10px;height:10px;border-radius:3px;background:#6b5d4c"></span><span data-bind="t.withoutOffset"></span></span>
            <span style="display:flex;align-items:center;gap:7px"><span id="legendAccentSwatch" style="width:10px;height:10px;border-radius:3px;background:#f5a860"></span><span data-bind="t.withOffset"></span></span>
          </div>

          <div style="display:flex;gap:10px">
            <div style="flex:none;display:flex;align-items:center">
              <span data-bind="t.loanAmountAxis" style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78"></span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:8px">
                <div id="yTickLabels" style="flex:none;width:42px;position:relative;height:280px"></div>
                <div style="flex:1;min-width:0;position:relative">
                  <svg viewBox="0 0 860 320" preserveAspectRatio="none" style="width:100%;height:280px;display:block">
                    <defs>
                      <linearGradient id="offsetGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#f5a860" stop-opacity="0.8"></stop>
                        <stop offset="1" stop-color="#f5a860" stop-opacity="0.08"></stop>
                      </linearGradient>
                    </defs>
                    <g id="gridLines"></g>
                    <g id="baseGroup" opacity="1">
                      <path id="baseArea" d="" fill="rgba(150,133,111,0.2)"></path>
                      <path id="basePath" d="" fill="none" stroke="#96856f" stroke-width="2" vector-effect="non-scaling-stroke"></path>
                    </g>
                    <path id="offArea" d="" fill="url(#offsetGrad)"></path>
                    <path id="offPath" d="" fill="none" stroke="#f5a860" stroke-width="2.5" vector-effect="non-scaling-stroke"></path>
                  </svg>
                  <div id="xTickLabels" style="position:relative;height:20px;margin-top:6px"></div>
                  <div data-bind="t.yearsAxis" style="text-align:center;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78;margin-top:4px"></div>
                </div>
              </div>
            </div>
          </div>
          <p data-bind="t.footnote" style="margin:18px 0 0;font-size:11px;color:#6f6151;line-height:1.5"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var props = { accent: '#f5a860', showBaseline: true };

  var state = {
    propertyPrice: 900000,
    depositPct: 20,
    cash: 200000,
    loanType: 'Owner Occupier',
    years: 30,
    rate: 6.04,
    income: 8500,
    expenses: [
      { id: 1, name: 'Living costs', amount: 2600 },
      { id: 2, name: 'Bills & utilities', amount: 850 },
      { id: 3, name: 'Transport', amount: 400 }
    ],
    nextId: 4,
    startMonths: 0,
    lumpOn: false,
    horizonYears: 5,
    lump: 0,
    lang: 'en'
  };

  function num(v) { var x = parseFloat(String(v).replace(/[^0-9.\-]/g, '')); return isNaN(x) ? 0 : x; }
  function money(n) { return '$' + Math.round(Math.max(0, n)).toLocaleString('en-US'); }

  function yearsMonths(months, zh) {
    var y = Math.floor(months / 12), m = Math.round(months % 12);
    if (zh) {
      if (y <= 0 && m <= 0) return '0 个月';
      var out = '';
      if (y > 0) out += y + ' 年';
      if (m > 0) out += (out ? ' ' : '') + m + ' 个月';
      return out;
    }
    if (y <= 0 && m <= 0) return '0 months';
    var parts = [];
    if (y > 0) parts.push(y + (y === 1 ? ' year' : ' years'));
    if (m > 0) parts.push(m + (m === 1 ? ' month' : ' months'));
    return parts.join(', ');
  }

  var dict = {
    en: {
      title: 'Home loan offset calculator',
      subtitle: 'Enter your loan, income and living costs — see how much interest your monthly surplus could save in an offset account.',
      loanDetails: 'Loan details', loanBalance: 'Loan balance', loanType: 'Loan type',
      propertyPrice: 'Estimated property price', depositLbl: 'Deposit',
      existingCash: 'Existing cash',
      offsetHint: '= existing cash − deposit',
      cashShortWarn: 'Your cash doesn\'t cover the deposit — offset starts at $0.',
      ownerOcc: 'Owner Occupier', investor: 'Investor',
      yearsRemaining: 'Years remaining', yearsUnit: 'years',
      interestRate: 'Interest rate',
      monthlyRepayment: 'Monthly repayment (P&I)',
      yourMoney: 'Your money', monthlyIncome: 'Monthly income (after tax)', monthlyExpenses: 'Monthly expenses',
      expensePlaceholder: 'Expense', addExpense: '+ Add expense',
      incomeLbl: 'Income', minusExpenses: '− Expenses', minusRepayment: '− Loan repayment',
      intoOffset: 'Into offset each month',
      deficitWarn: 'Your expenses and repayment exceed your income — nothing goes into the offset.',
      offsetAccount: 'Offset account', initialOffsetL: 'Initial offset balance', startUsing: 'Start using offset',
      now: 'Now', in6m: 'In 6 months', in1y: 'In 1 year', in2y: 'In 2 years', in5y: 'In 5 years',
      addLump: '⊕ Add a lump sum deposit', lumpDeposit: 'Lump sum deposit', remove: 'Remove',
      offsetAfterPre: 'Offset balance after', offsetAfterPost: 'years',
      interestSave: 'Total interest you could save', termReduce: 'Your loan term could reduce by',
      withoutOffset: 'Without offset', withOffset: 'With offset (surplus deposited monthly)',
      loanAmountAxis: 'Loan amount ($)', yearsAxis: 'Years',
      footnote: 'Assumes principal & interest repayments at a constant rate, monthly surplus deposited into the offset from the start date, and interest charged only on the loan balance not covered by your offset (interest stops once the offset fully covers the loan). Estimates only — not financial advice.',
      perMo: ' /mo',
      interestCompare: function (a, b) { return a + ' interest instead of ' + b; },
      payoffCompare: function (a, b) { return 'Paid off in ' + a + ' instead of ' + b; }
    },
    zh: {
      title: '房贷对冲账户（Offset）计算器',
      subtitle: '输入贷款、收入和生活开销，看看每月结余存入对冲账户能省下多少利息。',
      loanDetails: '贷款信息', loanBalance: '贷款余额', loanType: '贷款类型',
      propertyPrice: '预估房价', depositLbl: '首付',
      existingCash: '现有现金',
      offsetHint: '= 现有现金 − 首付',
      cashShortWarn: '现金不足以支付首付 — 对冲账户初始余额为 $0。',
      ownerOcc: '自住', investor: '投资',
      yearsRemaining: '剩余年限', yearsUnit: '年',
      interestRate: '利率',
      monthlyRepayment: '每月还款（本息）',
      yourMoney: '收入与开销', monthlyIncome: '月收入（税后）', monthlyExpenses: '月开销',
      expensePlaceholder: '开销项目', addExpense: '+ 添加开销',
      incomeLbl: '收入', minusExpenses: '− 开销', minusRepayment: '− 贷款还款',
      intoOffset: '每月存入对冲账户',
      deficitWarn: '开销和还款已超过收入 — 没有结余可存入对冲账户。',
      offsetAccount: '对冲账户', initialOffsetL: '初始对冲余额', startUsing: '开始使用时间',
      now: '现在', in6m: '6 个月后', in1y: '1 年后', in2y: '2 年后', in5y: '5 年后',
      addLump: '⊕ 添加一次性存款', lumpDeposit: '一次性存款', remove: '移除',
      offsetAfterPre: '', offsetAfterPost: '年后的对冲账户余额',
      interestSave: '可节省的总利息', termReduce: '贷款年限可缩短',
      withoutOffset: '无对冲账户', withOffset: '有对冲账户（每月存入结余）',
      loanAmountAxis: '贷款余额（$）', yearsAxis: '年',
      footnote: '假设按固定利率本息还款，月结余自开始日期起每月存入对冲账户；利息仅按未被对冲覆盖的贷款余额计算（对冲全额覆盖后不再产生利息）。结果仅为估算，不构成理财建议。',
      perMo: ' /月',
      interestCompare: function (a, b) { return '利息 ' + a + '（原本 ' + b + '）'; },
      payoffCompare: function (a, b) { return a + ' 还清（原需 ' + b + '）'; }
    }
  };

  function simulate(useOffset, P, r, n, pay, deposit, initOffset, lump, startMonths, horizonM) {
    var bal = P, interest = 0, offset = 0, months = 0;
    var pts = [P];
    var offsetAt5 = 0;
    for (var m = 1; m <= n && bal > 0.01; m++) {
      if (useOffset && m - 1 === startMonths) offset += initOffset + lump;
      if (useOffset && m - 1 >= startMonths) offset += deposit;
      var eff = Math.max(bal - offset, 0);
      var i = eff * r;
      interest += i;
      bal = bal + i - pay;
      if (bal < 0) bal = 0;
      months = m;
      if (m === horizonM) offsetAt5 = offset;
      pts.push(bal);
    }
    if (months < horizonM) offsetAt5 = offset;
    return { interest: interest, months: months, pts: pts, offsetAt5: offsetAt5 };
  }

  function pathFrom(pts, n, P) {
    if (!pts.length || P <= 0) return { line: 'M0,320', area: 'M0,320Z' };
    var W = 860, H = 320;
    var d = '';
    for (var i = 0; i < pts.length; i++) {
      var x = (i / n * W).toFixed(1);
      var y = (H - Math.min(pts[i], P) / P * H).toFixed(1);
      d += (i === 0 ? 'M' : 'L') + x + ',' + y;
    }
    var lastX = ((pts.length - 1) / n * W).toFixed(1);
    return { line: d, area: d + 'L' + lastX + ',' + H + 'L0,' + H + 'Z' };
  }

  var app = document.getElementById('app');
  var el = function (id) { return document.getElementById(id); };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function computeVals() {
    var s = state;
    var price = Math.max(0, s.propertyPrice);
    var depPct = Math.min(100, Math.max(0, s.depositPct));
    var depositAmt = price * depPct / 100;
    var P = Math.max(0, price - depositAmt);
    var initOffset = Math.max(0, s.cash - depositAmt);
    var cashShort = s.cash < depositAmt;
    var n = Math.max(1, s.years * 12);
    var r = Math.max(0, s.rate) / 100 / 12;
    var pay = r > 0 ? P * r / (1 - Math.pow(1 + r, -n)) : P / n;
    var totalExpenses = s.expenses.reduce(function (a, e) { return a + Math.max(0, e.amount); }, 0);
    var rawSurplus = s.income - totalExpenses - pay;
    var deposit = Math.max(0, rawSurplus);
    var lump = s.lumpOn ? Math.max(0, s.lump) : 0;

    var horizonM = Math.max(1, Math.round(s.horizonYears || 5)) * 12;
    var base = simulate(false, P, r, n, pay, 0, 0, 0, 0, horizonM);
    var off = simulate(true, P, r, n, pay, deposit, initOffset, lump, s.startMonths, horizonM);

    var saved = Math.max(0, base.interest - off.interest);
    var reduce = Math.max(0, base.months - off.months);

    var basePaths = pathFrom(base.pts, n, P);
    var offPaths = pathFrom(off.pts, n, P);

    var yTicks = [1, 0.75, 0.5, 0.25, 0].map(function (f) {
      return {
        pct: (1 - f) * 100,
        vy: (1 - f) * 320,
        label: P >= 1e6 ? (P * f / 1e6).toFixed(f === 0 ? 0 : 2) + 'M' : Math.round(P * f / 1000) + 'K'
      };
    });
    var step = s.years > 20 ? 5 : s.years > 8 ? 2 : 1;
    var xTicks = [];
    for (var y = 0; y <= s.years; y += step) xTicks.push({ pct: y / s.years * 100, label: String(y) });

    var L = dict[s.lang];
    var zh = s.lang === 'zh';

    var binds = {
      loanBalanceText: money(P),
      depositText: money(depositAmt),
      initialOffsetText: money(initOffset),
      payText: money(pay) + L.perMo,
      incomeText: money(s.income),
      expensesText: money(totalExpenses),
      surplusText: money(deposit) + L.perMo,
      offsetAt5Text: money(off.offsetAt5),
      savedText: money(saved),
      interestCompareText: L.interestCompare(money(off.interest), money(base.interest)),
      termReduceText: yearsMonths(reduce, zh),
      payoffCompareText: L.payoffCompare(yearsMonths(off.months, zh), yearsMonths(base.months, zh))
    };
    [10, 15, 20, 25, 30, 35, 40].forEach(function (yv) {
      binds['yearsOpt' + yv] = yv + ' ' + L.yearsUnit;
    });

    return {
      L: L, zh: zh, binds: binds,
      isDeficit: rawSurplus < 0,
      cashShort: cashShort,
      basePath: basePaths.line, baseArea: basePaths.area,
      offPath: offPaths.line, offArea: offPaths.area,
      yTicks: yTicks, xTicks: xTicks
    };
  }

  function update() {
    var v = computeVals();
    var L = v.L;
    var active = document.activeElement;

    // Text bindings: t.* labels and computed values
    document.querySelectorAll('[data-bind]').forEach(function (node) {
      var key = node.getAttribute('data-bind');
      var val;
      if (key.indexOf('t.') === 0) val = L[key.slice(2)];
      else val = v.binds[key];
      if (val !== undefined && node.textContent !== val) node.textContent = val;
    });

    // Input values (skip the element being edited)
    document.querySelectorAll('[data-model]').forEach(function (node) {
      var key = node.getAttribute('data-model');
      var val = String(state[key]);
      if (node !== active && String(node.value) !== val) node.value = val;
    });

    // Language toggle buttons
    var zh = v.zh;
    el('btnEn').style.background = zh ? 'transparent' : props.accent;
    el('btnEn').style.color = zh ? '#a08d78' : '#1f1813';
    el('btnZh').style.background = zh ? props.accent : 'transparent';
    el('btnZh').style.color = zh ? '#1f1813' : '#a08d78';
    document.documentElement.lang = zh ? 'zh' : 'en';

    // Expenses list
    var focusKey = active && active.getAttribute ? active.getAttribute('data-key') : null;
    el('expensesList').innerHTML = state.expenses.map(function (exp) {
      return '<div style="display:flex;gap:8px;align-items:center">' +
        '<input type="text" data-key="exp-' + exp.id + '-name" data-expense-id="' + exp.id + '" data-field="name" value="' + escapeHtml(exp.name) + '" placeholder="' + escapeHtml(L.expensePlaceholder) + '" style="flex:1;min-width:0;background:#2a2119;border:1px solid #46372a;border-radius:10px;color:#f0e8de;font-family:\'Manrope\',sans-serif;font-size:13px;font-weight:600;padding:10px 12px;outline:none">' +
        '<div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px;width:104px;flex:none">' +
          '<span style="padding:0 0 0 10px;color:#a08d78;font-weight:600;font-size:13px">$</span>' +
          '<input type="number" data-key="exp-' + exp.id + '-amount" data-expense-id="' + exp.id + '" data-field="amount" value="' + exp.amount + '" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:\'Space Grotesk\',sans-serif;font-size:14px;font-weight:600;padding:10px 8px 10px 4px">' +
        '</div>' +
        '<button data-remove-id="' + exp.id + '" title="Remove" class="btn-remove-expense" style="flex:none;width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:#6f6151;font-size:16px;cursor:pointer;line-height:1">×</button>' +
      '</div>';
    }).join('');
    if (focusKey) {
      var refocus = el('expensesList').querySelector('[data-key="' + focusKey + '"]');
      if (refocus) refocus.focus();
    }

    // Deficit warning
    el('deficitWarn').innerHTML = v.isDeficit
      ? '<div style="margin-top:8px;font-size:12px;font-weight:600;color:#f87171">' + escapeHtml(L.deficitWarn) + '</div>'
      : '';

    // Cash-short warning
    el('cashWarn').innerHTML = v.cashShort
      ? '<div style="margin-top:8px;font-size:12px;font-weight:600;color:#f87171">' + escapeHtml(L.cashShortWarn) + '</div>'
      : '';

    // Lump sum section
    if (state.lumpOn) {
      el('lumpSection').innerHTML =
        '<div>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
            '<label style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#a08d78">' + escapeHtml(L.lumpDeposit) + '</label>' +
            '<button data-action="toggleLump" class="btn-remove-lump" style="border:none;background:transparent;color:#6f6151;font-size:12px;font-weight:700;cursor:pointer;padding:0">' + escapeHtml(L.remove) + '</button>' +
          '</div>' +
          '<div style="display:flex;align-items:center;background:#2a2119;border:1px solid #46372a;border-radius:10px">' +
            '<span style="padding:0 0 0 14px;color:#a08d78;font-weight:600">$</span>' +
            '<input type="number" data-model="lump" value="' + state.lump + '" style="flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ffffff;font-family:\'Space Grotesk\',sans-serif;font-size:16px;font-weight:600;padding:12px 14px 12px 8px">' +
          '</div>' +
        '</div>';
    } else {
      el('lumpSection').innerHTML =
        '<button data-action="toggleLump" class="btn-add-lump" style="border:none;background:transparent;color:#f5a860;font-family:\'Manrope\',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;padding:0">' + escapeHtml(L.addLump) + '</button>';
    }

    // Chart
    el('basePath').setAttribute('d', v.basePath);
    el('baseArea').setAttribute('d', v.baseArea);
    el('offPath').setAttribute('d', v.offPath);
    el('offArea').setAttribute('d', v.offArea);
    el('baseGroup').setAttribute('opacity', props.showBaseline ? '1' : '0');
    el('legendBaseline').style.display = props.showBaseline ? 'flex' : 'none';

    el('gridLines').innerHTML = v.yTicks.map(function (t) {
      return '<line x1="0" x2="860" y1="' + t.vy + '" y2="' + t.vy + '" stroke="#362a1f" stroke-width="1" vector-effect="non-scaling-stroke"></line>';
    }).join('');

    el('yTickLabels').innerHTML = v.yTicks.map(function (t) {
      return '<span style="position:absolute;right:0;top:' + t.pct + '%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#8d7c68;font-family:\'Space Grotesk\',sans-serif">' + t.label + '</span>';
    }).join('');

    el('xTickLabels').innerHTML = v.xTicks.map(function (t) {
      return '<span style="position:absolute;left:' + t.pct + '%;transform:translateX(-50%);font-size:11px;font-weight:600;color:#8d7c68;font-family:\'Space Grotesk\',sans-serif">' + t.label + '</span>';
    }).join('');

    document.title = L.title.charAt(0).toUpperCase() + L.title.slice(1);
  }

  var modelHandlers = {
    propertyPrice: function (v) { state.propertyPrice = num(v); },
    depositPct: function (v) { state.depositPct = Math.min(100, Math.max(0, num(v))); },
    cash: function (v) { state.cash = num(v); },
    rate: function (v) { state.rate = num(v); },
    income: function (v) { state.income = num(v); },
    lump: function (v) { state.lump = num(v); },
    loanType: function (v) { state.loanType = v; },
    years: function (v) { state.years = parseInt(v, 10); },
    startMonths: function (v) { state.startMonths = parseInt(v, 10); },
    horizonYears: function (v) { state.horizonYears = Math.max(1, Math.min(40, parseInt(v, 10) || 1)); }
  };

  app.addEventListener('change', function (e) {
    var t = e.target;
    var model = t.getAttribute && t.getAttribute('data-model');
    if (model && modelHandlers[model]) {
      modelHandlers[model](t.value);
      update();
      return;
    }
    var expId = t.getAttribute && t.getAttribute('data-expense-id');
    if (expId) {
      var id = parseInt(expId, 10);
      var field = t.getAttribute('data-field');
      state.expenses = state.expenses.map(function (x) {
        if (x.id !== id) return x;
        var patched = { id: x.id, name: x.name, amount: x.amount };
        if (field === 'name') patched.name = t.value;
        else patched.amount = num(t.value);
        return patched;
      });
      update();
    }
  });

  // Live updates while dragging the sliders
  el('rateRange').addEventListener('input', function (e) {
    state.rate = num(e.target.value);
    update();
  });
  el('priceRange').addEventListener('input', function (e) {
    state.propertyPrice = num(e.target.value);
    update();
  });

  app.addEventListener('click', function (e) {
    var t = e.target.closest ? e.target.closest('[data-action],[data-remove-id]') : null;
    if (!t) return;
    var action = t.getAttribute('data-action');
    if (action === 'setEn') { state.lang = 'en'; update(); return; }
    if (action === 'setZh') { state.lang = 'zh'; update(); return; }
    if (action === 'addExpense') {
      state.expenses = state.expenses.concat([{ id: state.nextId, name: '', amount: 0 }]);
      state.nextId += 1;
      update();
      return;
    }
    if (action === 'toggleLump') { state.lumpOn = !state.lumpOn; update(); return; }
    var removeId = t.getAttribute('data-remove-id');
    if (removeId) {
      var id = parseInt(removeId, 10);
      state.expenses = state.expenses.filter(function (x) { return x.id !== id; });
      update();
    }
  });

  update();
})();
</script>
</body>
</html>
